services:
  # MongoDB Database
  mongodb:
    image: mongo:7.0
    container_name: visionfeast-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: visionfeast_db
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - visionfeast-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/visionfeast_db --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API (FastAPI)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: visionfeast-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/visionfeast_db
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - /app/__pycache__
      - /app/venv
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - visionfeast-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  visionfeast-network:
    driver: bridge

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
